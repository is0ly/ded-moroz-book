<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <defs>
    <linearGradient id="icebg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff1fa"/>
      <stop offset="100%" stop-color="#a8d8ea"/>
    </linearGradient>
    <linearGradient id="iceblock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9e9f6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#8ec6de" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- фон -->
  <rect width="800" height="500" fill="url(#icebg)"/>
  <g id="flake" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <path d="M90,68 v24 M78,80 h24 M82,72 l16,16 M82,88 l16,-16"/>
    <path d="M720,52 v20 M710,62 h20 M713,55 l14,14 M713,69 l14,-14" stroke-width="2.5"/>
    <path d="M660,418 v24 M648,430 h24 M652,422 l16,16 M652,438 l16,-16"/>
    <path d="M70,404 v18 M61,413 h18 M64,407 l12,12 M64,419 l12,-12" stroke-width="2.5"/>
    <path d="M400,36 v22 M389,47 h22 M392,39 l16,16 M392,55 l16,-16"/>
  </g>

  <!-- ледяная ниша-«холодильник» -->
  <rect x="150" y="90" width="500" height="330" rx="26" fill="url(#iceblock)" stroke="#ffffff" stroke-width="6"/>
  <rect x="178" y="116" width="444" height="278" rx="18" fill="#eaf7fd" opacity="0.55"/>
  <!-- сосульки -->
  <g fill="#c9e9f6" stroke="#ffffff" stroke-width="2">
    <path d="M220,96 l10,44 l10,-44 Z"/>
    <path d="M310,96 l8,30 l8,-30 Z"/>
    <path d="M470,96 l9,38 l9,-38 Z"/>
    <path d="M560,96 l8,26 l8,-26 Z"/>
  </g>
  <!-- блики льда -->
  <path d="M180,150 l60,-40" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <path d="M200,190 l40,-28" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.55"/>

  <!-- мясо мамонта -->
  <g transform="rotate(-8 300 320)">
    <path d="M240,330 q-2,-52 52,-56 q56,-4 62,44 q5,44 -40,52 q-60,10 -74,-40 Z" fill="#b35543"/>
    <path d="M258,318 q2,-30 38,-32 q30,-2 36,22" stroke="#d47a64" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M348,362 l40,26" stroke="#f5efdf" stroke-width="12" stroke-linecap="round"/>
    <circle cx="392" cy="382" r="10" fill="#f5efdf"/>
    <circle cx="382" cy="394" r="10" fill="#f5efdf"/>
  </g>
  <text x="300" y="415" text-anchor="middle" fill="#1e5f8e" font-size="14" font-style="italic" opacity="0.8">мясо мамонта</text>

  <!-- пергамент с рисунком железной дороги -->
  <g transform="rotate(6 520 270)">
    <rect x="430" y="180" width="180" height="180" rx="8" fill="#f5ecd7" stroke="#d9c9a3" stroke-width="4"/>
    <path d="M430,188 q10,14 0,26 M610,326 q-12,12 0,26" stroke="#d9c9a3" stroke-width="4" fill="none"/>
    <!-- детский рисунок паровозика -->
    <g stroke="#8b5a3c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="455" y="235" width="52" height="42" rx="6"/>
      <rect x="463" y="212" width="20" height="23" rx="4"/>
      <path d="M463,218 q10,-16 14,-28" opacity="0.7"/>
      <rect x="519" y="248" width="40" height="29" rx="5"/>
      <rect x="571" y="248" width="28" height="29" rx="5"/>
      <path d="M507,262 l12,0 M559,262 l12,0"/>
      <path d="M446,292 l160,0" stroke-dasharray="14 9"/>
    </g>
    <g fill="#c0392b">
      <circle cx="468" cy="286" r="8"/>
      <circle cx="494" cy="286" r="8"/>
      <circle cx="530" cy="286" r="7"/>
      <circle cx="551" cy="286" r="7"/>
      <circle cx="585" cy="286" r="7"/>
    </g>
    <text x="520" y="330" text-anchor="middle" fill="#8b5a3c" font-size="17" font-style="italic">хочу дорогу!</text>
  </g>

  <!-- подпись -->
  <text x="400" y="470" text-anchor="middle" fill="#1e5f8e" font-size="17" font-style="italic">Письмо с рисунком положили к мясу в лёд — и стали ждать!</text>
</svg>
