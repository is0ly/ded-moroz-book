<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Georgia, serif">
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10263f"/>
      <stop offset="100%" stop-color="#1e5f8e"/>
    </linearGradient>
  </defs>

  <!-- ночное небо -->
  <rect width="800" height="500" fill="url(#nightsky)"/>
  <circle cx="680" cy="90" r="42" fill="#f5efdf"/>
  <circle cx="664" cy="80" r="10" fill="#e3dcc6" opacity="0.6"/>
  <circle cx="694" cy="104" r="7" fill="#e3dcc6" opacity="0.6"/>
  <g fill="#ffffff">
    <circle cx="90" cy="70" r="3"/>
    <circle cx="200" cy="120" r="2"/>
    <circle cx="320" cy="60" r="2.5"/>
    <circle cx="470" cy="100" r="2"/>
    <circle cx="560" cy="50" r="3"/>
    <circle cx="150" cy="180" r="2"/>
    <circle cx="740" cy="200" r="2.5"/>
    <circle cx="420" cy="160" r="2"/>
  </g>
  <g stroke="#a8d8ea" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
    <path d="M130,238 v20 M120,248 h20 M123,241 l14,14 M123,255 l14,-14"/>
    <path d="M330,198 v18 M321,207 h18 M324,201 l12,12 M324,213 l12,-12"/>
    <path d="M600,250 v16 M592,258 h16 M594,252 l12,12 M594,264 l12,-12" stroke-width="2"/>
    <path d="M720,318 v18 M711,327 h18 M714,321 l12,12 M714,333 l12,-12"/>
    <path d="M60,348 v16 M52,356 h16 M54,350 l12,12 M54,362 l12,-12" stroke-width="2"/>
  </g>

  <!-- ёлки -->
  <g fill="#14503f">
    <path d="M110,340 l45,-90 l45,90 Z M120,300 l35,-70 l35,70 Z"/>
    <path d="M640,360 l38,-76 l38,76 Z M648,328 l30,-60 l30,60 Z"/>
  </g>
  <rect x="150" y="340" width="12" height="22" fill="#4a3628"/>
  <rect x="672" y="360" width="10" height="18" fill="#4a3628"/>
  <path d="M100,352 q55,14 110,2 M632,372 q46,12 92,2" stroke="#eef7fb" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- снежное поле -->
  <path d="M0,380 Q200,350 400,375 Q600,400 800,370 L800,500 L0,500 Z" fill="#eef7fb"/>

  <!-- сугроб -->
  <path d="M230,470 Q250,360 400,355 Q550,360 570,470 Z" fill="#ffffff"/>
  <path d="M255,455 Q275,385 400,380" stroke="#d5e9f2" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Дед Мороз, вылезающий из сугроба -->
  <g>
    <!-- руки в варежках -->
    <path d="M298,330 q-24,-40 -10,-72" stroke="#c0392b" stroke-width="26" fill="none" stroke-linecap="round"/>
    <circle cx="286" cy="252" r="20" fill="#f0c040"/>
    <path d="M502,330 q24,-40 12,-74" stroke="#c0392b" stroke-width="26" fill="none" stroke-linecap="round"/>
    <circle cx="512" cy="250" r="20" fill="#f0c040"/>
    <!-- туловище -->
    <path d="M320,380 q0,-70 80,-70 q80,0 80,70 Z" fill="#c0392b"/>
    <!-- борода -->
    <path d="M340,258 q-14,66 60,86 q74,-20 60,-86 Z" fill="#ffffff"/>
    <path d="M356,268 q-6,44 44,62 q50,-18 44,-62" stroke="#d5e9f2" stroke-width="5" fill="none"/>
    <!-- лицо -->
    <circle cx="400" cy="240" r="44" fill="#f2c9a0"/>
    <circle cx="384" cy="234" r="5" fill="#2c1f17"/>
    <circle cx="416" cy="234" r="5" fill="#2c1f17"/>
    <circle cx="400" cy="250" r="10" fill="#e29578"/>
    <circle cx="372" cy="252" r="9" fill="#c0392b" opacity="0.5"/>
    <circle cx="428" cy="252" r="9" fill="#c0392b" opacity="0.5"/>
    <path d="M382,266 q18,14 36,0" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- усы -->
    <path d="M400,258 q-22,-2 -34,10 M400,258 q22,-2 34,10" stroke="#ffffff" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- брови -->
    <path d="M372,222 q12,-8 22,-2 M406,220 q12,-6 22,2" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- колпак -->
    <path d="M356,214 q4,-52 44,-52 q40,0 44,52 Z" fill="#c0392b"/>
    <path d="M350,214 q50,-16 100,0 q2,12 -8,14 q-42,-12 -84,0 q-10,-2 -8,-14 Z" fill="#ffffff"/>
    <circle cx="452" cy="166" r="13" fill="#ffffff"/>
    <!-- снег на плечах -->
    <ellipse cx="330" cy="316" rx="18" ry="8" fill="#ffffff"/>
    <ellipse cx="474" cy="314" rx="16" ry="7" fill="#ffffff"/>
  </g>

  <!-- реплика -->
  <g>
    <path d="M508,130 q-14,-44 34,-52 q52,-8 66,26 q12,32 -24,44 q-18,6 -40,2 l-22,20 l4,-30 q-14,-4 -18,-10 Z" fill="#ffffff"/>
    <text x="572" y="112" text-anchor="middle" fill="#c0392b" font-size="26" font-weight="bold">Хо-хо!</text>
    <text x="572" y="136" text-anchor="middle" fill="#1e5f8e" font-size="15" font-style="italic">Кто я?..</text>
  </g>

  <!-- подпись -->
  <text x="400" y="486" text-anchor="middle" fill="#1e5f8e" font-size="17" font-style="italic">Где-то на краю света в сугробе что-то зашевелилось…</text>
</svg>
